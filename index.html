<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Horoscope</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #0d0a16; /* ใส่สีพื้นหลังให้กลืนกับเว็บหลัก ป้องกันจอกะพริบขาว */
        }
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <div id="app-container"></div>

    <script>
        // 1. ลิงก์ต้นทางของ Google Apps Script
        let baseUrl = "https://script.google.com/macros/s/AKfycby6ZxavqvlTF9Bl2nv6DBx_c67V186qPfQuzYUp79e5c3293Gfsc6EuOr5sm7x4NZed0w/exec";
        
        // 2. ดึง URL ของหน้าเว็บเบราว์เซอร์หลักมาตรวจสอบ
        const currentUrl = window.location.href;
        
        // 3. ใช้ Regex ควานหา Key ที่ขึ้นต้นด้วย HORO-
        const match = currentUrl.match(/(HORO-[A-Z0-9]+)/i);
        
        // 4. ถ้าเจอ Key ให้เอาไปต่อท้ายลิงก์ GAS
        if (match && match[1]) {
            const keyCode = match[1].toUpperCase();
            baseUrl += "?key=" + keyCode;
        }
        
        // 5. สร้าง iframe พร้อมลิงก์ที่สมบูรณ์แล้วยัดลงไปในหน้าเว็บ (ทำให้โหลดโหลดครั้งเดียวจบ)
        const container = document.getElementById('app-container');
        container.innerHTML = '<iframe src="' + baseUrl + '"></iframe>';
    </script>
</body>
</html>
